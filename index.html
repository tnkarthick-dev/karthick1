<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
</head>

<body>

<h2>Contact Us</h2>

<form action="https://formspree.io/f/mbdnjdze" method="POST">

    <label for="name">Name:</label><br>
    <input 
        type="text" 
        id="name" 
        name="name" 
        required
    >
    <br><br>

    <label for="email">Email:</label><br>
    <input 
        type="email" 
        id="email" 
        name="email" 
        required
    >
    <br><br>

    <label for="message">Message:</label><br>
    <textarea 
        id="message" 
        name="message" 
        required
    ></textarea>
    <br><br>

    <button type="submit">Send Message</button>

</form>

</body>
</html>
